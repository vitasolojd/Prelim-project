<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Cutie Blog ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #ffe8f1; color: #d6336c; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .form-container { background:#fff0f6; padding:30px 35px; border-radius:20px; box-shadow:0 12px 25px rgba(217,51,108,0.2); max-width:400px; width:100%; text-align:center; }
    h2 { font-family:'Pacifico', cursive; color:#d81b60; margin-bottom:20px; }
    input { width:100%; padding:12px 15px; margin-bottom:15px; border-radius:12px; border:1px solid #f48fb1; font-size:1rem; transition:0.3s; }
    input:focus { outline:none; border-color:#ec407a; box-shadow:0 0 8px rgba(236,64,122,0.3); }
    .btn { width:100%; padding:12px 0; border:none; border-radius:30px; font-weight:600; color:white; background:#f48fb1; cursor:pointer; font-size:1.1rem; transition:0.3s; }
    .btn:hover { background:#ec407a; }
    .toggle-btn { background:#fff; color:#d81b60; border:2px solid #d81b60; margin-top:10px; border-radius:30px; width:100%; padding:10px 0; font-weight:600; cursor:pointer; transition:0.3s; }
    .toggle-btn:hover { background:#f48fb1; color:white; border-color:#f48fb1; }
    .messages { margin-bottom:15px; font-weight:600; }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Create Account</h2>

  <!-- Messages -->
  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <p style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %};">{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}

  <form method="POST" action="{% url 'signup' %}">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password1" placeholder="Password" required>
    <input type="password" name="password2" placeholder="Confirm Password" required>
    <button type="submit" class="btn">Sign Up</button>
  </form>

  <a href="{% url 'login' %}"><button class="toggle-btn">Already have an account? Sign In</button></a>
</div>

</body>
</html>
