<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cutie Blog ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #ffe8f1;
      color: #d6336c;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;
    }

    header {
      background-color: #ffc0dd;
      padding: 1rem 2rem;
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem;
      color: #e91e63;
      box-shadow: 0 2px 5px rgba(217,51,108,0.3);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #9c1651;
    }

    /* Form container */
    .form-container {
      background: #fff0f6;
      padding: 30px 35px;
      border-radius: 20px;
      box-shadow: 0 12px 25px rgba(217, 51, 108, 0.2);
      max-width: 400px;
      width: 100%;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .form-container:hover {
      transform: translateY(-5px);
    }

    .form-container h2 {
      font-family: 'Pacifico', cursive;
      color: #d81b60;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      border: 1px solid #f48fb1;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #ec407a;
      box-shadow: 0 0 8px rgba(236, 64, 122, 0.3);
    }

    .btn {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      color: white;
      background: #f48fb1;
      cursor: pointer;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ec407a;
    }

    .toggle-btn {
      background: #fff;
      color: #d81b60;
      border: 2px solid #d81b60;
      margin-top: 10px;
      border-radius: 30px;
      width: 100%;
      padding: 10px 0;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .toggle-btn:hover {
      background: #f48fb1;
      color: white;
      border-color: #f48fb1;
    }

    footer {
      background-color: #ffc0dd;
      padding: 1rem;
      font-family: 'Pacifico', cursive;
      color: #d81b60;
      box-shadow: 0 -2px 5px rgba(217,51,108,0.3);
    }

    /* Hide Sign Up initially */
    #signupForm {
      display: none;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 25px 20px;
      }
      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>

<header>Cutie Blog</header>

<main>
  <h1>Welcome to Cutie Blog! ✨</h1>
  <p>Sign in to continue 💖</p>

  <!-- Sign In Form -->
  <div class="form-container" id="signinForm">
    <h2>Sign In</h2>
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <button type="button" class="toggle-btn" id="showSignUpBtn">Don't have an account? Sign Up</button>
  </div>

  <!-- Sign Up Form -->
  <div class="form-container" id="signupForm">
    <h2>Create Account</h2>
    <form method="POST" action="{% url 'signup' %}">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password1" placeholder="Password" required>
      <input type="password" name="password2" placeholder="Confirm Password" required>
      <button type="submit" class="btn">Sign Up</button>
    </form>
    <button type="button" class="toggle-btn" id="showSignInBtn">Already have an account? Sign In</button>
  </div>
</main>

<footer>© 2026 Cutie Blog. All rights reserved 💖</footer>

<script>
  const signinForm = document.getElementById('signinForm');
  const signupForm = document.getElementById('signupForm');
  const showSignUpBtn = document.getElementById('showSignUpBtn');
  const showSignInBtn = document.getElementById('showSignInBtn');

  showSignUpBtn.addEventListener('click', () => {
    signinForm.style.display = 'none';
    signupForm.style.display = 'block';
  });

  showSignInBtn.addEventListener('click', () => {
    signupForm.style.display = 'none';
    signinForm.style.display = 'block';
  });
</script>

</body>
</html>
